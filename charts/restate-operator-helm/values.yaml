replicaCount: 1
nameOverride: "restate-operator"
version: "" # pin a specific version

# install the chart's CRDs; set false if they are managed elsewhere (e.g. a separate manifest) to avoid duplicate ownership
# note: templated CRDs update on `helm upgrade` and carry helm.sh/resource-policy: keep, so they survive `helm uninstall` and switching this to false (existing custom resources are preserved)
installCrds: true

image:
  repository: ghcr.io/restatedev/restate-operator
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  annotations: {}
podAnnotations: {}

awsPodIdentityAssociationCluster: null
gcpWorkloadIdentity: null
clusterDns: null # defaults to "cluster.local" in the operator binary
canaryImage: null # defaults to "alpine:3.21"; image must provide cat, grep, wget and a CA bundle at /etc/ssl/certs/ca-certificates.crt

podSecurityContext:
  fsGroup: 2000
  fsGroupChangePolicy: "OnRootMismatch"
securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 3000

logging:
  env_filter: info,restate=debug

env: []

affinity: {}
nodeSelector: {}
tolerations: []

service:
  type: ClusterIP
  port: 80

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 100Mi

serviceMonitor:
  enabled: false
  path: /metrics
  scheme: http
